<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 620" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrL" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="1018" height="618" rx="16" fill="#f7f9fc" stroke="#e2e8f0"/>
  <text x="28" y="36" font-size="16" font-weight="700" fill="#1e293b">Receipt loop</text>

  <!-- lifelines -->
  <g stroke="#cbd5e1" stroke-width="1.4" stroke-dasharray="4 4">
    <line x1="150" y1="92" x2="150" y2="592"/>
    <line x1="420" y1="92" x2="420" y2="592"/>
    <line x1="680" y1="92" x2="680" y2="592"/>
    <line x1="910" y1="92" x2="910" y2="592"/>
  </g>

  <!-- participant headers -->
  <g text-anchor="middle">
    <rect x="70" y="56" width="160" height="34" rx="8" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="150" y="78" font-size="12.5" font-weight="700" fill="#1e293b">Channel Service</text>
    <rect x="346" y="56" width="148" height="34" rx="8" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="420" y="78" font-size="12.5" font-weight="700" fill="#1e293b">CRM /receipts</text>
    <rect x="566" y="56" width="228" height="34" rx="8" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="680" y="78" font-size="12.5" font-weight="700" fill="#1e293b">Events log (append-only)</text>
    <rect x="788" y="56" width="222" height="34" rx="8" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="899" y="78" font-size="12.5" font-weight="700" fill="#1e293b">Communications (status)</text>
  </g>

  <!-- messages + notes -->
  <g>
    <!-- 1 -->
    <line x1="150" y1="118" x2="416" y2="118" stroke="#475569" stroke-width="1.6" marker-end="url(#arrL)"/>
    <rect x="120" y="100" width="300" height="16" fill="#f7f9fc"/>
    <text x="270" y="112" text-anchor="middle" font-size="12" fill="#334155">1. POST receipt batch (a duplicate + out-of-order inside)</text>

    <rect x="300" y="128" width="240" height="44" rx="6" fill="#fff7d6" stroke="#e6cf73"/>
    <text x="420" y="146" text-anchor="middle" font-size="11.5" fill="#475569">Verify HMAC over raw body, 401 if wrong.</text>
    <text x="420" y="162" text-anchor="middle" font-size="11.5" fill="#475569">In-batch dedupe by (communication_id, event_type).</text>

    <!-- 2 -->
    <line x1="420" y1="200" x2="676" y2="200" stroke="#475569" stroke-width="1.6" marker-end="url(#arrL)"/>
    <rect x="430" y="182" width="240" height="16" fill="#f7f9fc"/>
    <text x="550" y="194" text-anchor="middle" font-size="12" fill="#334155">2. INSERT events ON CONFLICT DO NOTHING</text>

    <rect x="576" y="212" width="208" height="40" rx="6" fill="#fff7d6" stroke="#e6cf73"/>
    <text x="680" y="230" text-anchor="middle" font-size="11.5" fill="#475569">Duplicate callbacks become</text>
    <text x="680" y="245" text-anchor="middle" font-size="11.5" fill="#475569">silent no-ops (idempotency).</text>

    <!-- 3 -->
    <line x1="420" y1="284" x2="906" y2="284" stroke="#475569" stroke-width="1.6" marker-end="url(#arrL)"/>
    <rect x="470" y="266" width="320" height="16" fill="#f7f9fc"/>
    <text x="630" y="278" text-anchor="middle" font-size="12" fill="#334155">3. UPDATE status WHERE status_rank &lt; incoming_rank</text>

    <rect x="800" y="296" width="212" height="58" rx="6" fill="#fff7d6" stroke="#e6cf73"/>
    <text x="906" y="314" text-anchor="middle" font-size="11.5" fill="#475569">Out-of-order safe: clicked(5) before</text>
    <text x="906" y="329" text-anchor="middle" font-size="11.5" fill="#475569">delivered(2) still upgrades; a late</text>
    <text x="906" y="344" text-anchor="middle" font-size="11.5" fill="#475569">delivered never downgrades.</text>

    <!-- 4 -->
    <line x1="150" y1="388" x2="416" y2="388" stroke="#475569" stroke-width="1.6" marker-end="url(#arrL)"/>
    <rect x="150" y="370" width="236" height="16" fill="#f7f9fc"/>
    <text x="268" y="382" text-anchor="middle" font-size="12" fill="#334155">4. Retry same batch with backoff</text>

    <!-- 5 -->
    <line x1="420" y1="436" x2="676" y2="436" stroke="#475569" stroke-width="1.6" marker-end="url(#arrL)"/>
    <rect x="430" y="418" width="248" height="16" fill="#f7f9fc"/>
    <text x="554" y="430" text-anchor="middle" font-size="12" fill="#334155">5. ON CONFLICT DO NOTHING returns 0 new rows</text>

    <rect x="500" y="452" width="330" height="30" rx="6" fill="#fff7d6" stroke="#e6cf73"/>
    <text x="665" y="471" text-anchor="middle" font-size="11.5" fill="#475569">Retry storm is harmless, status unchanged.</text>

    <!-- 6 -->
    <line x1="420" y1="524" x2="154" y2="524" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="6 5" marker-end="url(#arrL)"/>
    <rect x="150" y="506" width="290" height="16" fill="#f7f9fc"/>
    <text x="295" y="518" text-anchor="middle" font-size="12" fill="#334155">6. 200 {accepted, duplicate, unknown_communication}</text>
  </g>
</svg>
